<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#111111"/>

  <!-- Swatch 1 -->
  <rect x="40" y="60" width="200" height="200" rx="16" fill="#e11d48"/>
  <text x="140" y="300" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Vermelho Primário</text>
  <text x="140" y="328" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">#e11d48</text>

  <!-- Swatch 2 -->
  <rect x="260" y="60" width="200" height="200" rx="16" fill="#9f1239"/>
  <text x="360" y="300" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Vermelho Escuro</text>
  <text x="360" y="328" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">#9f1239</text>

  <!-- Swatch 3 -->
  <rect x="480" y="60" width="200" height="200" rx="16" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="580" y="300" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Preto Marca</text>
  <text x="580" y="328" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">#111111</text>

  <!-- Swatch 4 -->
  <rect x="700" y="60" width="200" height="200" rx="16" fill="#22c55e"/>
  <text x="800" y="300" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Verde Vida</text>
  <text x="800" y="328" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">#22c55e</text>

  <!-- Swatch 5 -->
  <rect x="920" y="60" width="200" height="200" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1020" y="300" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Branco Suave</text>
  <text x="1020" y="328" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">#f9fafb</text>

  <!-- Title -->
  <text x="600" y="385" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="18" fill="#374151" text-anchor="middle" letter-spacing="3">EU TE INDICO — PALETA DE CORES OFICIAL</text>
</svg>
